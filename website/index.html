<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Doearno</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Disable right-click
      document.addEventListener('contextmenu', (e) => e.preventDefault());

      // Disable keyboard shortcuts
      document.addEventListener('keydown', (e) => {
        if (
          e.key === 'F12' ||
          (e.ctrlKey && e.shiftKey && e.key === 'I') ||
          (e.ctrlKey && e.shiftKey && e.key === 'J') ||
          (e.ctrlKey && e.key === 'U') ||
          (e.metaKey && e.altKey && e.key === 'I') ||
          (e.metaKey && e.altKey && e.key === 'J') ||
          (e.metaKey && e.key === 'U')
        ) {
          e.preventDefault();
        }
      });

      // DevTools detection trap
      function detectDevTools() {
        const threshold = 160;
        const isDevToolsOpen = 
          window.outerWidth - window.innerWidth > threshold || 
          window.outerHeight - window.innerHeight > threshold;

        if (isDevToolsOpen) {
          document.body.innerHTML = '<div style="display:flex;justify-content:center;align-items:center;height:100vh;font-family:sans-serif;background:#000;color:#fff;text-align:center;padding:20px;"><div><h1>Access Denied</h1><p>Please close Developer Tools to view this website.</p></div></div>';
          window.location.reload();
        }
      }

      // Debugger trap to pause execution if DevTools is open
      setInterval(() => {
        const startTime = performance.now();
        debugger;
        if (performance.now() - startTime > 100) {
          detectDevTools();
        }
      }, 1000);

      window.addEventListener('resize', detectDevTools);
    </script>
  </body>
</html>
