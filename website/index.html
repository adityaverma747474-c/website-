<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Doearno</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Disable right-click
      document.addEventListener('contextmenu', (e) => e.preventDefault());

      // Disable F12, Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+U
      document.addEventListener('keydown', (e) => {
        if (
          e.key === 'F12' ||
          (e.ctrlKey && e.shiftKey && e.key === 'I') ||
          (e.ctrlKey && e.shiftKey && e.key === 'J') ||
          (e.ctrlKey && e.key === 'U') ||
          (e.metaKey && e.altKey && e.key === 'I') || // Mac CMD+Option+I
          (e.metaKey && e.altKey && e.key === 'J') || // Mac CMD+Option+J
          (e.metaKey && e.key === 'U') // Mac CMD+U
        ) {
          e.preventDefault();
        }
      });

      // Anti-Debugger: Pauses the execution if DevTools is open
      (function() {
        const threshold = 160;
        const check = () => {
          const startTime = performance.now();
          debugger;
          const endTime = performance.now();
          if (endTime - startTime > threshold) {
            window.location.replace("about:blank");
          }
        };
        
        setInterval(check, 1000);

        // Detect window size changes (common when opening DevTools)
        window.onresize = () => {
          if ((window.outerHeight - window.innerHeight) > threshold || (window.outerWidth - window.innerWidth) > threshold) {
            window.location.replace("about:blank");
          }
        };
      })();


      // Clear console regularly
      setInterval(() => {
        console.clear();
      }, 500);

    </script>
  </body>
</html>
